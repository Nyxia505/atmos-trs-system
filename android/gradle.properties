# Keep heap/metaspace moderate: very large values (e.g. 8G+4G) can starve Windows and cause
# errno 1450 (Insufficient system resources) during Flutter asset copy / other I/O.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
kotlin.daemon.jvmargs=-Xmx1536m
android.useAndroidX=true
android.enableJetifier=true
