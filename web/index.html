<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ATMOS TRS">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ATMOS TRS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ATMOS TRS</title>
  <link rel="manifest" href="manifest.json">

</head>
<body>
  <!-- reCAPTCHA container for Firebase Phone Auth (required for web) -->
  <div id="recaptcha-container"></div>
  <!-- Load Maps JS before Flutter (blocking) so google.maps exists when the map widget mounts -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyABHzKStpFi9K-nIb0TS4kmedR-9_-zqh4&v=weekly"></script>
  <!-- TripPlan trip route: DirectionsService (avoids CORS on directions/json) -->
  <script src="directions_bridge.js"></script>
  <script src="flutter_bootstrap.js"></script>
</body>
</html>
